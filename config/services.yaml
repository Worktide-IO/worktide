# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Locales the app can display translatable content + user profiles in.
    # Extend this list to enable more languages; the LocaleResolver validates
    # User.preferredLanguage / Workspace.locale against it.
    app.supported_locales: ['de', 'en']
    # Fallback when neither the user nor the workspace resolves to a supported
    # locale. Mirrors framework/translation default_locale.
    app.default_locale: 'en'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Channel adapter discovery — every concrete InboundAdapter /
    # OutboundAdapter / ConversationThreader gets auto-tagged so
    # AdapterRegistry can index them by code.
    _instanceof:
        App\Channels\InboundAdapter:
            tags: ['worktide.channel.inbound']
        App\Channels\OutboundAdapter:
            tags: ['worktide.channel.outbound']
        App\Channels\ConversationThreader:
            tags: ['worktide.channel.threader']
        App\Channels\SyncableAdapter:
            tags: ['worktide.channel.sync']
        App\Channels\SocialPublisherAdapter:
            tags: ['worktide.channel.social']
        # Research agent: every external-search adapter is indexed for the registry.
        App\Service\ExternalSearch\ExternalSearchProviderInterface:
            tags: ['worktide.external_search']
        # Notification fan-out: every resolver turning a DomainEventLog into
        # per-user notifications is collected for the dispatcher.
        App\Notification\NotificationResolverInterface:
            tags: ['worktide.notification_resolver']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Auto-convert Symfony Uid objects to their binary form when bound to a
    # prepared statement without an explicit type — fixes API Platform
    # SearchFilter on UUID-FK columns (see src/Doctrine/Middleware/UuidBinding).
    App\Doctrine\Middleware\UuidBinding\UuidBindingMiddleware:
        tags:
            - { name: doctrine.middleware }

    # Storage backend is chosen at runtime from FILE_STORAGE_ADAPTER (local|s3)
    # by the factory, so FileStorage callers never change. Local (var/uploads)
    # is the dev default; S3 is required at 10GB+ mailbox scale.
    App\Service\Storage\StorageAdapterFactory:
        arguments:
            $driver: '%env(string:FILE_STORAGE_ADAPTER)%'
            $localPath: '%kernel.project_dir%/var/uploads'
            $s3Key: '%env(string:S3_KEY)%'
            $s3Secret: '%env(string:S3_SECRET)%'
            $s3Region: '%env(string:S3_REGION)%'
            $s3Bucket: '%env(string:S3_BUCKET)%'
            $s3Endpoint: '%env(string:S3_ENDPOINT)%'
            $s3PathStyle: '%env(bool:S3_USE_PATH_STYLE)%'
            $s3Prefix: '%env(string:S3_PREFIX)%'

    file_storage.filesystem:
        class: League\Flysystem\FilesystemOperator
        factory: ['@App\Service\Storage\StorageAdapterFactory', 'create']

    App\Service\FileStorage:
        arguments:
            $filesystem: '@file_storage.filesystem'

    # Search backend chosen at runtime from SEARCH_PROVIDER (mysql|meilisearch).
    # MySQL is the default and needs no service; Meilisearch is a drop-in.
    App\Service\Search\MeilisearchClientFactory:
        arguments:
            $dsn: '%env(string:MEILISEARCH_DSN)%'
            $apiKey: '%env(string:MEILISEARCH_API_KEY)%'

    App\Service\Search\MeilisearchProvider:
        arguments:
            $indexPrefix: '%env(string:MEILISEARCH_INDEX_PREFIX)%'

    App\Service\Search\SearchProviderFactory:
        arguments:
            $provider: '%env(string:SEARCH_PROVIDER)%'

    App\Service\Search\SearchProviderInterface:
        factory: ['@App\Service\Search\SearchProviderFactory', 'create']

    App\EventSubscriber\SearchIndexingListener:
        arguments:
            $searchProvider: '%env(string:SEARCH_PROVIDER)%'

    # Active display-locale resolution (user preference → workspace → default).
    App\Service\I18n\LocaleResolver:
        arguments:
            $supportedLocales: '%app.supported_locales%'
            $defaultLocale: '%app.default_locale%'
    App\Service\I18n\RecipientLocaleResolver:
        arguments:
            $supportedLocales: '%app.supported_locales%'
            $defaultLocale: '%app.default_locale%'

    App\Command\AworkImportCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\AworkRebuildCustomerHierarchyCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Api\WebhookEchoController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Symfony's rate_limiter component does not auto-wire factories by
    # parameter name — bind them explicitly so the AuthRateLimitSubscriber
    # gets the right buckets. Names must match framework.rate_limiter.*.
    App\EventSubscriber\AuthRateLimitSubscriber:
        arguments:
            $authRefreshLimiter: '@limiter.auth_refresh'
            $authPasswordChangeLimiter: '@limiter.auth_password_change'
            $authForgotPasswordLimiter: '@limiter.auth_forgot_password'
            $authResetPasswordLimiter: '@limiter.auth_reset_password'
            $authMagicLinkConsumeLimiter: '@limiter.auth_magic_link_consume'

    # Per-workspace cost guardrail: caps the automatic "suggest ticket?" LLM
    # call fired per inbound mail (see framework.rate_limiter.ai_auto_suggest).
    App\Service\Inbound\InboundEventProcessor:
        arguments:
            $aiAutoSuggestLimiter: '@limiter.ai_auto_suggest'
            $automationWebhookUrl: '%env(string:N8N_WEBHOOK_URL)%'

    # Delivers processed inbound events to the external automation engine (n8n).
    # Trusted, operator-configured endpoint — no SSRF guard (see handler docblock).
    App\MessageHandler\DispatchAutomationEventHandler:
        arguments:
            $webhookUrl: '%env(string:N8N_WEBHOOK_URL)%'
            $webhookSecret: '%env(string:N8N_WEBHOOK_SECRET)%'

    # Shared token guard for the n8n → Worktide automation endpoints (conversation
    # actions + mute-rule CRUD). Token IS the credential (empty = disabled / 404).
    App\Automation\AutomationTokenGuard:
        arguments:
            $token: '%env(string:AUTOMATION_API_TOKEN)%'

    # Auto-link inbound mail → Contact/Customer. Shared / contact-form sender
    # addresses that send on behalf of the real person must never match a
    # Contact (see INBOUND_IGNORED_SENDER_EMAILS).
    App\Service\Inbound\ContactResolver:
        arguments:
            $ignoredSenderEmails: '%env(default::INBOUND_IGNORED_SENDER_EMAILS)%'

    # Same explicit binding for the public-form submission limiter.
    App\Controller\Api\PublicFormController:
        arguments:
            $publicFormSubmitLimiter: '@limiter.public_form_submit'

    # Public booking reuses the same per-IP submit limiter for POST /v1/book/{slug}.
    App\Controller\Api\PublicBookingController:
        arguments:
            $publicFormSubmitLimiter: '@limiter.public_form_submit'

    # Feedback board submit/reply limiters (keyed on user id in the controllers).
    App\Controller\Api\Feedback\FeedbackController:
        arguments:
            $feedbackSubmitLimiter: '@limiter.feedback_submit'
            $feedbackReplyLimiter: '@limiter.feedback_reply'

    App\Controller\Api\Portal\PortalFeedbackController:
        arguments:
            $feedbackSubmitLimiter: '@limiter.feedback_submit'
            $feedbackReplyLimiter: '@limiter.feedback_reply'

    # Workspace-invitation email (branded accept link → SPA).
    App\Service\WorkspaceInvitationMailer:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'

    # Cross-workspace project-share invitation email (branded accept link → SPA).
    App\Service\ProjectShareInvitationMailer:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'

    # Brute-force / abuse limiters for the remaining public endpoints.
    App\EventSubscriber\PublicEndpointRateLimitSubscriber:
        arguments:
            $publicTokenAcceptLimiter: '@limiter.public_token_accept'
            $inboundWebhookLimiter: '@limiter.inbound_webhook'
            $publicAnonymousLimiter: '@limiter.public_anonymous'

    # Password-reset service needs the SPA base (to build the reset link),
    # the portal base (for the portal set-password link) and a system
    # from-address. All come from env.
    App\Service\PasswordResetService:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'

    # Notification → email bridge (instant channel) + the digest command both
    # build deep-links (portal vs staff base) and a system from-address.
    App\Notification\NotificationEmailNotifier:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'

    # Notification → chat bridge (Slack/Mattermost/Teams). Needs the deep-link
    # bases (portal vs staff); SecretBox + OutboundUrlGuard are autowired.
    App\Notification\NotificationChatNotifier:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'
    App\Controller\Api\ChatWebhookController:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
    App\Controller\Api\Portal\PortalChatWebhookController:
        arguments:
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'

    # Passwordless portal login / staff impersonation link — needs the portal
    # base to build the /auth/magic URL.
    App\Service\Portal\MagicLinkService:
        arguments:
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'

    # Booking (Calendly-style) confirmation/cancellation mail + ICS: needs the
    # portal base (cancel link) and a system from-address.
    App\Service\Booking\BookingMailer:
        arguments:
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'
    App\Service\Booking\IcsGenerator:
        arguments:
            $mailFrom: '%env(MAILER_FROM)%'

    # Newsletter bulk send: per-recipient mail (from-address) + the HMAC-signed
    # unsubscribe link (APP_SECRET seed, portal base for the /newsletter/unsubscribe page).
    App\Service\Newsletter\NewsletterMailer:
        arguments:
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'
    App\Service\Newsletter\NewsletterUnsubscribeSigner:
        arguments:
            $appSecret: '%env(APP_SECRET)%'
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'
    App\Service\Newsletter\NewsletterConfirmSigner:
        arguments:
            $appSecret: '%env(APP_SECRET)%'
            $portalBaseUrl: '%env(PORTAL_BASE_URL)%'

    App\EventSubscriber\BookmarkCredentialsCipherListener:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    # White-label branding, resolved from BRAND_* env. Source of truth for the
    # public /v1/branding endpoint (SPAs) and the `brand` Twig global (emails).
    # string: keeps empty values as '' (BrandingConfig applies the fall-backs).
    App\Service\Branding\BrandingConfig:
        arguments:
            $name: '%env(string:BRAND_NAME)%'
            $legalName: '%env(string:BRAND_LEGAL_NAME)%'
            $logoUrl: '%env(string:BRAND_LOGO_URL)%'
            $logoUrlDark: '%env(string:BRAND_LOGO_URL_DARK)%'
            $primaryColor: '%env(string:BRAND_PRIMARY_COLOR)%'
            $accentColor: '%env(string:BRAND_ACCENT_COLOR)%'
            $imprintUrl: '%env(string:BRAND_IMPRINT_URL)%'
            $privacyUrl: '%env(string:BRAND_PRIVACY_URL)%'
            $supportEmail: '%env(string:BRAND_SUPPORT_EMAIL)%'
            $mailFrom: '%env(MAILER_FROM)%'
            $mailFromName: '%env(string:MAILER_FROM_NAME)%'
            $defaultUri: '%env(DEFAULT_URI)%'
            $demoMode: '%env(bool:DEMO_MODE)%'
            $demoBannerText: '%env(string:DEMO_BANNER_TEXT)%'

    # Channel adapter registry (Phase C.2). Tags are produced by
    # _instanceof above; the threader map stays empty until concrete
    # adapters in C.3+ populate it via their own services snippet
    # (or a future CompilerPass).
    App\Channels\AdapterRegistry:
        arguments:
            $inbound: !tagged_iterator 'worktide.channel.inbound'
            $outbound: !tagged_iterator 'worktide.channel.outbound'
            $threaders: !tagged_iterator 'worktide.channel.threader'
            $sync: !tagged_iterator 'worktide.channel.sync'
            $social: !tagged_iterator 'worktide.channel.social'
            # Map adapterCode → index in the threaders iterator. Order
            # follows the alphabetical service-id sort that
            # tagged_iterator uses by default:
            #   0 = App\Channels\Adapter\Email\MailThreader
            #   1 = App\Channels\Adapter\Zabbix\ZabbixThreader
            # "Email" < "Zabbix" so adding ZabbixThreader keeps the mail
            # entries at index 0. Verify after any new threader with:
            #   bin/console debug:container --tag=worktide.channel.threader
            $threaderCodeMap:
                email_imap: 0
                email_graph: 0
                email_gmail: 0
                email_webhook: 0
                zabbix: 1

    # Build/version identity for GET /v1/version. Values from build-time env
    # (APP_VERSION = release tag, APP_COMMIT = git SHA) + a BUILD_TIME file
    # written at image build; all degrade to dev/unknown/null when unset.
    App\Service\AppVersion:
        arguments:
            $version: '%env(default::APP_VERSION)%'
            $commit: '%env(default::APP_COMMIT)%'
            $environment: '%kernel.environment%'
            $projectDir: '%kernel.project_dir%'

    # Notification fan-out. The dispatcher runs every tagged resolver over a
    # DomainEventLog to produce per-user notifications.
    App\Notification\NotificationDispatcher:
        arguments:
            $resolvers: !tagged_iterator 'worktide.notification_resolver'

    # Central default-deny egress gate. EGRESS_ALLOW empty = nothing leaves the
    # system; approve modules explicitly (e.g. "llm,ticket_push:<channelUuid>").
    App\Egress\EgressGuard:
        arguments:
            $allow: '%env(default::EGRESS_ALLOW)%'

    # Smart-link previews use their own cache pool (config/packages/cache.yaml).
    App\Service\LinkPreview\LinkPreviewResolver:
        arguments:
            $linkPreviewCache: '@cache.link_preview'

    # Smart-link preview fetch limiter (keyed on user id in the controller).
    App\Controller\Api\LinkPreviewController:
        arguments:
            $linkPreviewLimiter: '@limiter.link_preview'

    # Cloud LLM providers. Anthropic (Claude, default) and Infomaniak
    # (Swiss/EU-hosted, OpenAI-compatible) are both wired; LLM_PROVIDER selects
    # the active *cloud* one via LlmProviderFactory (default: anthropic).
    App\Service\Llm\AnthropicLlmProvider:
        arguments:
            $apiKey: '%env(default::ANTHROPIC_API_KEY)%'
            $model: '%env(default::ANTHROPIC_MODEL)%'
    App\Service\Llm\InfomaniakLlmProvider:
        arguments:
            $apiToken: '%env(default::INFOMANIAK_API_TOKEN)%'
            $productId: '%env(default::INFOMANIAK_PRODUCT_ID)%'
            $model: '%env(default::INFOMANIAK_MODEL)%'
            $apiBase: '%env(default::INFOMANIAK_API_BASE)%'
    App\Service\Llm\LlmProviderFactory:
        arguments:
            $providerName: '%env(default::LLM_PROVIDER)%'
    # On-infra local provider (Ollama/vLLM, OpenAI-compatible). Inert until
    # OLLAMA_API_BASE is set — until then every local route degrades to cloud
    # (unchanged default behaviour); see LlmRouter.
    App\Service\Llm\OllamaLlmProvider:
        arguments:
            $apiBase: '%env(default::OLLAMA_API_BASE)%'
            $apiKey: '%env(default::OLLAMA_API_KEY)%'
            $model: '%env(default::OLLAMA_MODEL)%'
    # The interface the app depends on is the per-task-type router (RoutingLlmProvider),
    # which picks local vs. cloud per feature + workspace via LlmRouter.
    App\Service\Llm\LlmProviderInterface: '@App\Service\Llm\RoutingLlmProvider'

    # External-search adapters for the research agent. Inert without their API
    # key (isConfigured() = false); every call is gated by the external_search
    # egress module. The registry fans a query across all configured adapters.
    App\Service\ExternalSearch\Provider\TavilySearchProvider:
        arguments:
            $apiKey: '%env(default::TAVILY_API_KEY)%'
    App\Service\ExternalSearch\Provider\BuiltWithSearchProvider:
        arguments:
            $apiKey: '%env(default::BUILTWITH_API_KEY)%'
    App\Service\ExternalSearch\Provider\SurfeSearchProvider:
        arguments:
            $apiKey: '%env(default::SURFE_API_KEY)%'
    App\Service\ExternalSearch\ExternalSearchRegistry:
        arguments:
            $providers: !tagged_iterator 'worktide.external_search'

    # Signed, short-lived public media URLs (Instagram pulls image_url itself).
    App\Service\Social\SocialMediaUrlSigner:
        arguments:
            $appSecret: '%env(APP_SECRET)%'
            $apiBaseUrl: '%env(OAUTH_REDIRECT_BASE)%'

    # libsodium SecretBox for Channel.authConfig at-rest encryption.
    # APP_SECRET acts as the key seed (BLAKE2b-derived).
    App\Channels\SecretBox:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    # OAuth2 plumbing for MS Graph + Gmail (Phase C.5). The credential
    # resolver walks per-channel → per-workspace → global env vars.
    App\Channels\OAuth\OAuth2AppCredentialsResolver:
        arguments:
            $baseRedirectUri: '%env(OAUTH_REDIRECT_BASE)%'
            $graphClientId: '%env(default::OAUTH_GRAPH_CLIENT_ID)%'
            $graphClientSecret: '%env(default::OAUTH_GRAPH_CLIENT_SECRET)%'
            $gmailClientId: '%env(default::OAUTH_GMAIL_CLIENT_ID)%'
            $gmailClientSecret: '%env(default::OAUTH_GMAIL_CLIENT_SECRET)%'
            $linkedinClientId: '%env(default::OAUTH_LINKEDIN_CLIENT_ID)%'
            $linkedinClientSecret: '%env(default::OAUTH_LINKEDIN_CLIENT_SECRET)%'

    App\Channels\OAuth\OAuth2Client:
        arguments:
            $stateSecret: '%env(APP_SECRET)%'

    App\Controller\Api\ChannelOAuthController:
        arguments:
            $spaRedirectBase: '%env(SPA_BASE_URL)%'

    # Graph push subscriptions notify our public webhook endpoint, so they need
    # the public API base (same host the OAuth callback uses).
    App\Channels\Adapter\EmailGraph\GraphSubscriptionManager:
        arguments:
            $publicBase: '%env(OAUTH_REDIRECT_BASE)%'
