# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Channel adapter discovery — every concrete InboundAdapter /
    # OutboundAdapter / ConversationThreader gets auto-tagged so
    # AdapterRegistry can index them by code.
    _instanceof:
        App\Channels\InboundAdapter:
            tags: ['worktide.channel.inbound']
        App\Channels\OutboundAdapter:
            tags: ['worktide.channel.outbound']
        App\Channels\ConversationThreader:
            tags: ['worktide.channel.threader']
        App\Channels\SyncableAdapter:
            tags: ['worktide.channel.sync']
        App\Channels\SocialPublisherAdapter:
            tags: ['worktide.channel.social']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Auto-convert Symfony Uid objects to their binary form when bound to a
    # prepared statement without an explicit type — fixes API Platform
    # SearchFilter on UUID-FK columns (see src/Doctrine/Middleware/UuidBinding).
    App\Doctrine\Middleware\UuidBinding\UuidBindingMiddleware:
        tags:
            - { name: doctrine.middleware }

    # Storage backend is chosen at runtime from FILE_STORAGE_ADAPTER (local|s3)
    # by the factory, so FileStorage callers never change. Local (var/uploads)
    # is the dev default; S3 is required at 10GB+ mailbox scale.
    App\Service\Storage\StorageAdapterFactory:
        arguments:
            $driver: '%env(string:FILE_STORAGE_ADAPTER)%'
            $localPath: '%kernel.project_dir%/var/uploads'
            $s3Key: '%env(string:S3_KEY)%'
            $s3Secret: '%env(string:S3_SECRET)%'
            $s3Region: '%env(string:S3_REGION)%'
            $s3Bucket: '%env(string:S3_BUCKET)%'
            $s3Endpoint: '%env(string:S3_ENDPOINT)%'
            $s3PathStyle: '%env(bool:S3_USE_PATH_STYLE)%'
            $s3Prefix: '%env(string:S3_PREFIX)%'

    file_storage.filesystem:
        class: League\Flysystem\FilesystemOperator
        factory: ['@App\Service\Storage\StorageAdapterFactory', 'create']

    App\Service\FileStorage:
        arguments:
            $filesystem: '@file_storage.filesystem'

    # Search backend chosen at runtime from SEARCH_PROVIDER (mysql|meilisearch).
    # MySQL is the default and needs no service; Meilisearch is a drop-in.
    App\Service\Search\MeilisearchClientFactory:
        arguments:
            $dsn: '%env(string:MEILISEARCH_DSN)%'
            $apiKey: '%env(string:MEILISEARCH_API_KEY)%'

    App\Service\Search\MeilisearchProvider:
        arguments:
            $indexPrefix: '%env(string:MEILISEARCH_INDEX_PREFIX)%'

    App\Service\Search\SearchProviderFactory:
        arguments:
            $provider: '%env(string:SEARCH_PROVIDER)%'

    App\Service\Search\SearchProviderInterface:
        factory: ['@App\Service\Search\SearchProviderFactory', 'create']

    App\EventSubscriber\SearchIndexingListener:
        arguments:
            $searchProvider: '%env(string:SEARCH_PROVIDER)%'

    App\Command\AworkImportCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\AworkRebuildCustomerHierarchyCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\Api\WebhookEchoController:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Symfony's rate_limiter component does not auto-wire factories by
    # parameter name — bind them explicitly so the AuthRateLimitSubscriber
    # gets the right buckets. Names must match framework.rate_limiter.*.
    App\EventSubscriber\AuthRateLimitSubscriber:
        arguments:
            $authRefreshLimiter: '@limiter.auth_refresh'
            $authPasswordChangeLimiter: '@limiter.auth_password_change'
            $authForgotPasswordLimiter: '@limiter.auth_forgot_password'
            $authResetPasswordLimiter: '@limiter.auth_reset_password'

    # Same explicit binding for the public-form submission limiter.
    App\Controller\Api\PublicFormController:
        arguments:
            $publicFormSubmitLimiter: '@limiter.public_form_submit'

    # Password-reset service needs the SPA base (to build the reset link)
    # and a system from-address. Both come from env.
    App\Service\PasswordResetService:
        arguments:
            $spaBaseUrl: '%env(SPA_BASE_URL)%'
            $mailFrom: '%env(MAILER_FROM)%'

    # Channel adapter registry (Phase C.2). Tags are produced by
    # _instanceof above; the threader map stays empty until concrete
    # adapters in C.3+ populate it via their own services snippet
    # (or a future CompilerPass).
    App\Channels\AdapterRegistry:
        arguments:
            $inbound: !tagged_iterator 'worktide.channel.inbound'
            $outbound: !tagged_iterator 'worktide.channel.outbound'
            $threaders: !tagged_iterator 'worktide.channel.threader'
            $sync: !tagged_iterator 'worktide.channel.sync'
            $social: !tagged_iterator 'worktide.channel.social'
            # Map adapterCode → index in the threaders iterator. Order
            # follows the alphabetical service-id sort that
            # tagged_iterator uses by default. MailThreader is the only
            # threader so far → index 0 covers both email_imap and the
            # OAuth-based email adapters (Phase C.5) which reuse it.
            $threaderCodeMap:
                email_imap: 0
                email_graph: 0
                email_gmail: 0

    # Central default-deny egress gate. EGRESS_ALLOW empty = nothing leaves the
    # system; approve modules explicitly (e.g. "llm,ticket_push:<channelUuid>").
    App\Egress\EgressGuard:
        arguments:
            $allow: '%env(default::EGRESS_ALLOW)%'

    # LLM provider (Anthropic) behind LlmProviderInterface. Model defaults to
    # claude-opus-4-8 when ANTHROPIC_MODEL is unset.
    App\Service\Llm\AnthropicLlmProvider:
        arguments:
            $apiKey: '%env(default::ANTHROPIC_API_KEY)%'
            $model: '%env(default::ANTHROPIC_MODEL)%'
    App\Service\Llm\LlmProviderInterface: '@App\Service\Llm\AnthropicLlmProvider'

    # Signed, short-lived public media URLs (Instagram pulls image_url itself).
    App\Service\Social\SocialMediaUrlSigner:
        arguments:
            $appSecret: '%env(APP_SECRET)%'
            $apiBaseUrl: '%env(OAUTH_REDIRECT_BASE)%'

    # libsodium SecretBox for Channel.authConfig at-rest encryption.
    # APP_SECRET acts as the key seed (BLAKE2b-derived).
    App\Channels\SecretBox:
        arguments:
            $appSecret: '%env(APP_SECRET)%'

    # OAuth2 plumbing for MS Graph + Gmail (Phase C.5). The credential
    # resolver walks per-channel → per-workspace → global env vars.
    App\Channels\OAuth\OAuth2AppCredentialsResolver:
        arguments:
            $baseRedirectUri: '%env(OAUTH_REDIRECT_BASE)%'
            $graphClientId: '%env(default::OAUTH_GRAPH_CLIENT_ID)%'
            $graphClientSecret: '%env(default::OAUTH_GRAPH_CLIENT_SECRET)%'
            $gmailClientId: '%env(default::OAUTH_GMAIL_CLIENT_ID)%'
            $gmailClientSecret: '%env(default::OAUTH_GMAIL_CLIENT_SECRET)%'
            $linkedinClientId: '%env(default::OAUTH_LINKEDIN_CLIENT_ID)%'
            $linkedinClientSecret: '%env(default::OAUTH_LINKEDIN_CLIENT_SECRET)%'

    App\Channels\OAuth\OAuth2Client:
        arguments:
            $stateSecret: '%env(APP_SECRET)%'

    App\Controller\Api\ChannelOAuthController:
        arguments:
            $spaRedirectBase: '%env(SPA_BASE_URL)%'
