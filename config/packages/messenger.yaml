framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            # Slow, expensive, rate-limited AI/agent jobs (LLM calls, web
            # research). Separate transport so a 30s Claude call can't starve
            # the fast async queue (webhooks/mercure/mail). Consumed by a
            # dedicated low-concurrency worker: messenger:consume ai_agents.
            ai_agents:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: ai_agents
                retry_strategy:
                    max_retries: 5
                    multiplier: 3
                    max_delay: 60000
            # Search index sync — keeps Meilisearch in step with entity changes.
            # Its own queue so a slow/unreachable search engine never delays the
            # fast async queue. Idle entirely when SEARCH_PROVIDER=mysql.
            search:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: search
                retry_strategy:
                    max_retries: 5
                    multiplier: 3
                    max_delay: 60000
            failed: 'doctrine://default?queue_name=failed'
            # sync: 'sync://'

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            # Outbound webhook deliveries — async so slow consumer endpoints
            # don't block API mutations.
            App\Message\SendWebhookMessage: async

            # Inbound event processing — off the ingest request thread so a
            # slow pipeline (rules, AI) doesn't hold up the webhook 2xx / pull.
            App\Message\ProcessInboundEventMessage: async

            # Social post fan-out — network calls off the request thread.
            App\Message\PublishSocialPostMessage: async

            # AI ticket triage — slow LLM call on its own transport so it never
            # starves the fast async queue.
            App\Message\TriageTicketMessage: ai_agents
            App\Message\SuggestConversationTicketMessage: ai_agents
            App\Message\GenerateMarketingCopyMessage: ai_agents
            App\Message\GenerateUpgradeOutreachMessage: ai_agents
            App\Message\RunResearchMissionMessage: ai_agents
            App\Message\PlanDistributionMessage: ai_agents
            App\Message\SyncSearchIndexMessage: search

            # Mercure live-update publishing — off the request thread so a slow
            # or unreachable hub can't hang/500 entity writes (the API Platform
            # postFlush dispatch otherwise publishes synchronously). Delivered by
            # a messenger worker; if the hub is unreachable the publish just
            # fails in the background, leaving the write itself unaffected.
            Symfony\Component\Mercure\Update: async

            # Route your messages to the transports
            # 'App\Message\YourMessage': async
