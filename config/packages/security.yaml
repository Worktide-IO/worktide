security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api_login:
            pattern: ^/v1/auth/login$
            stateless: true
            # Blocks JWT issuance for a portal user whose customer is not
            # freigeschaltet (Customer::portalEnabled) — see PortalUserChecker.
            user_checker: App\Security\PortalUserChecker
            json_login:
                check_path: /v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            # 5 attempts/minute per (ip + username) tuple. Symfony builds
            # the limiter internally from these numbers — `limiter:` only
            # accepts a RequestRateLimiterInterface, which our auth_login
            # factory isn't. Successes do not consume the budget, only
            # failures do.
            login_throttling:
                max_attempts: 5
                interval: '1 minute'

        api_refresh:
            pattern: ^/v1/auth/refresh$
            stateless: true
            user_checker: App\Security\PortalUserChecker
            refresh_jwt:
                check_path: /v1/auth/refresh

        api:
            pattern: ^/v1
            stateless: true
            provider: app_user_provider
            # Re-checks on every JWT-authenticated request, so switching a
            # customer's portal off invalidates live sessions immediately.
            user_checker: App\Security\PortalUserChecker
            # Personal Access Tokens are checked first — its supports() returns
            # false for anything that isn't wt_pat_..., so JWT keeps handling
            # regular Bearer-eyJ... requests transparently.
            custom_authenticators:
                - App\Security\PersonalAccessTokenAuthenticator
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/v1/auth/login,   roles: PUBLIC_ACCESS }
        - { path: ^/v1/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/v1/auth/forgot-password, roles: PUBLIC_ACCESS }   # email is mailed a token; no auth
        - { path: ^/v1/auth/reset-password,  roles: PUBLIC_ACCESS }   # token IS the credential
        - { path: ^/v1/docs,         roles: PUBLIC_ACCESS }
        - { path: ^/v1/contexts,     roles: PUBLIC_ACCESS }
        - { path: ^/v1/_webhook-echo, roles: PUBLIC_ACCESS }   # dev sink for outbound webhooks
        - { path: ^/v1/workspace_invitations/[^/]+/accept, roles: PUBLIC_ACCESS }   # token IS the credential
        - { path: ^/v1/channels/oauth/callback, roles: PUBLIC_ACCESS }   # provider redirect, signed-state CSRF guard
        - { path: ^/v1/inbound/webhooks/, roles: PUBLIC_ACCESS }   # per-channel token IS the credential
        - { path: ^/v1/inbound/entity-webhooks/, roles: PUBLIC_ACCESS }   # per-channel token IS the credential (entity-sync)
        - { path: ^/v1/forms/,       roles: PUBLIC_ACCESS }   # public form schema + submission; slug IS the credential
        - { path: ^/v1/social/media/, roles: PUBLIC_ACCESS }   # signed short-lived media token IS the credential (Instagram fetch)
        - { path: ^/v1/setup,        roles: PUBLIC_ACCESS }   # first-run wizard; /setup/init self-locks once any user exists
        - { path: ^/v1/branding,     roles: PUBLIC_ACCESS }   # white-label config; non-sensitive, needed on login/set-password pages
        - { path: ^/v1/$,            roles: PUBLIC_ACCESS }
        # Portal endpoints require ROLE_PORTAL. Portal users have ONLY that role
        # (User::getRoles() withholds the implicit ROLE_USER from them), so the
        # ROLE_USER baseline below locks them out of every staff endpoint, and
        # this rule keeps staff (ROLE_USER, no ROLE_PORTAL) out of the portal.
        # MUST stay above the ^/v1 catch-all.
        - { path: ^/v1/portal,       roles: ROLE_PORTAL }
        - { path: ^/v1,              roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
