security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api_login:
            pattern: ^/v1/auth/login$
            stateless: true
            json_login:
                check_path: /v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api_refresh:
            pattern: ^/v1/auth/refresh$
            stateless: true
            refresh_jwt:
                check_path: /v1/auth/refresh

        api:
            pattern: ^/v1
            stateless: true
            provider: app_user_provider
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/v1/auth/login,   roles: PUBLIC_ACCESS }
        - { path: ^/v1/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/v1/docs,         roles: PUBLIC_ACCESS }
        - { path: ^/v1/contexts,     roles: PUBLIC_ACCESS }
        - { path: ^/v1/$,            roles: PUBLIC_ACCESS }
        - { path: ^/v1,              roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
