framework:
    cache:
        # Stable namespace for cache keys so a shared Redis/Valkey instance
        # doesn't collide with other apps (and keys survive a code reload).
        prefix_seed: worktide

        # The "app" cache stores to the filesystem by default (prod-safe: no
        # external dependency). Local dev + any env that sets REDIS_URL switches
        # it to Redis/Valkey below (when@dev). APCu remains an option:
        #app: cache.adapter.apcu

        # Namespaced pools use the above "app" backend by default
        pools:
            # Smart-link preview cache (LinkPreviewResolver). Own pool so its
            # short-lived entries can be cleared independently of cache.app and,
            # under load, be pointed at Redis/Valkey (Phase S) on its own.
            cache.link_preview:
                default_lifetime: 86400

# Local dev runs against the Valkey service (.ddev/docker-compose.valkey.yaml)
# with REDIS_URL wired via .ddev/config.yaml web_environment. The app pool (and
# every namespaced pool that inherits it, incl. cache.link_preview) then lives
# in Valkey instead of the filesystem. Prod stays on the filesystem default
# until a prod Valkey exists and this is promoted to a shared/when@prod block.
when@dev:
    framework:
        cache:
            app: cache.adapter.redis
            default_redis_provider: '%env(REDIS_URL)%'
