# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    uid:
        default_uuid_version: 7
        time_based_uuid_version: 7

    # ----- Rate limiters -------------------------------------------------
    # In-memory + cache-backed limiters protecting credential-handling
    # endpoints. The "login" limiter is wired via security.firewall.login_
    # throttling (Symfony picks it up by name); the others are applied in
    # event subscribers because Symfony has no built-in throttle for our
    # refresh / password-change routes.
    rate_limiter:
        auth_login:
            policy: 'sliding_window'
            limit: 5
            interval: '1 minute'
        auth_refresh:
            policy: 'token_bucket'
            limit: 30
            rate: { interval: '1 minute', amount: 30 }
        auth_password_change:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        auth_forgot_password:
            policy: 'fixed_window'
            limit: 3
            interval: '1 hour'
        auth_reset_password:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        # Passwordless portal login consume (/v1/auth/magic-link/consume). The
        # token is long-random + single-use + short-TTL, so this is
        # defense-in-depth against guessing. Keyed on client IP.
        auth_magic_link_consume:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'
        # Anonymous public-form submissions (/v1/forms/{slug}), keyed on
        # client IP. Applied inside PublicFormController, not the firewall.
        public_form_submit:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        # Feedback board submit / reply. Authenticated + write to ONE shared
        # global board, so keyed on the USER id (not IP) — one account can't
        # flood the board. Applied inside the feedback controllers.
        feedback_submit:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        feedback_reply:
            policy: 'sliding_window'
            limit: 20
            interval: '1 minute'
        # Token-as-credential accept endpoints (workspace + customer
        # invitations). Tokens are long-random, so this is defense-in-depth
        # against token guessing. Keyed on client IP. Applied in
        # PublicEndpointRateLimitSubscriber.
        public_token_accept:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'
        # Inbound webhook ingestion (/v1/inbound/(entity-)webhooks/{token}).
        # Generous ceiling so legitimate provider bursts pass while a
        # token-guessing flood from one IP is capped. Tune per deployment if
        # a channel legitimately exceeds it.
        inbound_webhook:
            policy: 'sliding_window'
            limit: 240
            interval: '1 minute'
        # Catch-all for the remaining anonymous public endpoints (branding,
        # setup, public-form schema GET, signed media, oauth callback). Keeps
        # scraping / enumeration / amplification in check without touching the
        # credential endpoints above (which have their own tighter limiters).
        public_anonymous:
            policy: 'sliding_window'
            limit: 120
            interval: '1 minute'
        # Cost guardrail for the automatic "create a ticket?" LLM call fired per
        # inbound mail (InboundEventProcessor). Keyed per WORKSPACE, not IP: caps
        # how many auto-suggestions a single workspace can burn per hour so a busy
        # shared mailbox or a pull spike can't run thousands of paid LLM calls
        # (this is what produced the 3k+ ai_agents backlog). Excess mail simply
        # gets no auto-suggestion — the on-demand "suggest ticket" button still
        # works. Tune per deployment / lift once per-workspace budgets land.
        ai_auto_suggest:
            policy: 'sliding_window'
            limit: 30
            interval: '1 hour'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
