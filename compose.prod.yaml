# Production stack for the Worktide API — consumed by Coolify (Docker Compose
# buildpack). One image, three roles.
#
# MySQL and the Mercure hub are SEPARATE Coolify resources (not defined here) —
# wire them in through the env vars below (DATABASE_URL, MERCURE_URL, ...).
#
# Coolify injects all secrets/env from its UI. The values here are only
# safe non-secret defaults / role toggles.

x-app: &app
  build:
    context: .
    target: frankenphp_prod
    args:
      # Build/version identity for GET /v1/version. SOURCE_COMMIT is provided by
      # Coolify at build time; APP_VERSION is an optional operator build var set
      # to the release tag (falls back to the short commit if unset). Both are
      # hex/tag strings (no `$`), so plain ${...} substitution is safe here.
      APP_COMMIT: "${SOURCE_COMMIT:-}"
      APP_VERSION: "${APP_VERSION:-}"
  restart: unless-stopped
  environment: &app-env
    APP_ENV: prod
    # Set these in Coolify (secrets): APP_SECRET, DATABASE_URL, JWT_PASSPHRASE,
    # MERCURE_URL, MERCURE_PUBLIC_URL, MERCURE_JWT_SECRET, ANTHROPIC_API_KEY,
    # S3_* , OAUTH_* , CORS_ALLOW_ORIGIN, TAVILY_API_KEY, BUILTWITH_API_KEY ...
    # White-label branding (all optional, set in Coolify to rebrand):
    # BRAND_NAME, BRAND_LEGAL_NAME, BRAND_LOGO_URL, BRAND_LOGO_URL_DARK,
    # BRAND_PRIMARY_COLOR, BRAND_ACCENT_COLOR, BRAND_IMPRINT_URL,
    # BRAND_PRIVACY_URL, BRAND_SUPPORT_EMAIL, MAILER_FROM_NAME.
    FILE_STORAGE_ADAPTER: s3
    SEARCH_PROVIDER: mysql
    MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
    # CORS_ALLOW_ORIGIN carries a regex with special chars (the `$` end-anchor,
    # `\.`). When injected inline it gets mangled by compose's `$` interpolation,
    # so the running container ends up with a value that matches no origin →
    # every cross-origin call from the SPAs is blocked (no Access-Control-Allow-
    # Origin). Map it via ${...} substitution instead: compose substitutes the
    # env-file value verbatim (single pass, no re-interpolation of the value).
    CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN}"
  # Named volume keeps the generated JWT keypair stable across restarts.
  volumes:
    - jwt_keys:/app/config/jwt
  # Join the shared `coolify` network so the app can reach the managed MySQL
  # database and the Mercure hub (both live there), and so Coolify's Traefik
  # (also on `coolify`) can route to the `app` service. Without this the
  # compose stack is isolated on its own per-resource network and cannot reach
  # the managed database → migrations fail → the web container crash-loops.
  networks:
    - default
    - coolify

services:
  # ---- HTTP (FrankenPHP) ---------------------------------------------------
  app:
    <<: *app
    environment:
      <<: *app-env
      # Only the web container runs migrations on boot (no worker race).
      AUTO_MIGRATE: "1"
      # Coolify maps the domain to this service:port. Traefik terminates TLS.
      SERVER_NAME: ":80"
    # Tell Coolify which domain + port serves this service (or set it in the UI).
    # Replace with the value from Coolify's "Domains" field:
    #   SERVICE_FQDN_APP: https://api.worktide.wappler.systems
    expose:
      - "80"
    # Liveness on the real HTTP port. `curl` (present in the image — it's used at
    # build time) without `-f` exits 0 for ANY HTTP response (incl. 404), and
    # non-zero only when the connection is refused — i.e. it passes iff FrankenPHP
    # is serving on :80. The old `curl :2019/metrics` check always 404'd
    # (FrankenPHP doesn't expose /metrics) → unhealthy → Coolify cycled the
    # container to the restart cap.
    healthcheck:
      test: ["CMD", "curl", "-sS", "-o", "/dev/null", "http://localhost:80/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---- Messenger worker ----------------------------------------------------
  worker:
    <<: *app
    command:
      - php
      - bin/console
      - messenger:consume
      - async
      - ai_agents
      - search
      - "--time-limit=3600"
      - "--memory-limit=256M"
      - "-vv"
    environment:
      <<: *app-env
      AUTO_MIGRATE: "0"
    healthcheck:
      test: ["CMD", "php", "bin/console", "messenger:stats"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---- Scheduler (supercronic) --------------------------------------------
  scheduler:
    <<: *app
    # -no-reap: supercronic runs as PID 1 here, and its zombie reaper fatals
    # after ~12s in this image. It already waits on its own direct job children
    # (php bin/console …, which terminate cleanly), so disabling the PID-1
    # reaper is safe — the reaper only matters for orphaned zombies, which this
    # scheduler never spawns.
    command: ["supercronic", "-no-reap", "/etc/crontab"]
    environment:
      <<: *app-env
      AUTO_MIGRATE: "0"
    healthcheck:
      test: ["CMD-SHELL", "supercronic -test /etc/crontab >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  jwt_keys:

networks:
  # Coolify's shared predefined network (Traefik + managed DB + Mercure live here).
  coolify:
    external: true
  # Internal network for inter-service traffic within this stack.
  default:
