expose_php = 0
date.timezone = ${TZ:-Europe/Berlin}
apc.enable_cli = 1
session.use_strict_mode = 1
zend.detect_unicode = 0

; https://symfony.com/doc/current/performance.html
short_open_tag = 0

; File uploads — inbound mail attachments can be large.
upload_max_filesize = 64M
post_max_size = 72M
memory_limit = 512M
max_execution_time = 120
